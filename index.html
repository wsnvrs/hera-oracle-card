<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hera's Oracle Card</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section id="cover">

    <img
    id="coverDeck"
    src="ui/cover-deck.png"
    alt="Cover Deck">

    <h1>Hera's Oracle Card</h1>

    <p>
        Tahun Ketiga Perjalanan Nyai Hera
    </p>

    <button onclick="openDeck()">
        Buka Deck
    </button>

</section>

<section id="loading">

    <h2>✨</h2>

    <p>Mengocok kartu...</p>

</section>

<section id="result">

    <img
    id="card"
    alt="Oracle Card">

    <br>

    <button onclick="drawCard()">
        Ambil Kartu Lagi
    </button>

</section>

<script src="script.js"></script>

</body>

</html>
